name: PartFetch Downloader v2

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "One or more direct download URLs. Separate multiple URLs with a new line or comma."
        required: true
        type: string
      storage_mode:
        description: "Where to save the result"
        required: true
        default: "repo"
        type: choice
        options:
          - repo
          - release
      output_folder:
        description: "Folder inside repo when storage_mode=repo"
        required: false
        default: "downloads"
        type: string
      output_name:
        description: "Optional output filename. Only used when there is exactly one URL."
        required: false
        default: ""
        type: string
      release_tag:
        description: "Release tag when storage_mode=release. Empty means auto-generated."
        required: false
        default: ""
        type: string
      split_size_mib:
        description: "Part size in MiB. Must be 1-98."
        required: false
        default: "98"
        type: string
      dedupe:
        description: "Skip repo save if a manifest with the same SHA256 already exists"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: partfetch-downloader
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest

    env:
      URLS: ${{ inputs.urls }}
      STORAGE_MODE: ${{ inputs.storage_mode }}
      OUTPUT_FOLDER: ${{ inputs.output_folder }}
      OUTPUT_NAME: ${{ inputs.output_name }}
      RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
      SPLIT_SIZE_MIB: ${{ inputs.split_size_mib }}
      DEDUPE: ${{ inputs.dedupe }}
      GH_TOKEN: ${{ github.token }}
      HTTP_AUTH_HEADER: ${{ secrets.DOWNLOAD_AUTH_HEADER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download, split, package, and save
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          LIMIT_BYTES=$((100 * 1024 * 1024))

          if ! [[ "$SPLIT_SIZE_MIB" =~ ^[0-9]+$ ]]; then
            echo "split_size_mib must be a number."
            exit 1
          fi

          if (( SPLIT_SIZE_MIB < 1 || SPLIT_SIZE_MIB > 98 )); then
            echo "split_size_mib must be between 1 and 98."
            exit 1
          fi

          PART_BYTES=$((SPLIT_SIZE_MIB * 1024 * 1024))

          if [[ "$STORAGE_MODE" != "repo" && "$STORAGE_MODE" != "release" ]]; then
            echo "storage_mode must be repo or release."
            exit 1
          fi

          sanitize_component() {
            printf '%s' "$1" | tr -cd 'A-Za-z0-9._-'
          }

          trim() {
            sed 's/^[[:space:]]*//; s/[[:space:]]*$//'
          }

          folder="$(printf '%s' "$OUTPUT_FOLDER" | sed 's#^\./##; s#//*#/#g; s#/$##')"

          if [[ -z "$folder" || "$folder" == "." || "$folder" == /* || "$folder" == *".."* ]]; then
            echo "Invalid output folder: $folder"
            exit 1
          fi

          urls_file="$RUNNER_TEMP/partfetch-urls.txt"
          printf '%s\n' "$URLS" \
            | tr ',' '\n' \
            | sed 's/\r//g' \
            | trim \
            | grep -v '^#' \
            | grep -v '^$' > "$urls_file"

          url_count="$(wc -l < "$urls_file" | tr -d ' ')"

          if (( url_count == 0 )); then
            echo "No URL provided."
            exit 1
          fi

          timestamp="$(date -u +'%Y-%m-%d_%H%M%S')"
          work_dir="$RUNNER_TEMP/partfetch-work"
          release_asset_dir="$RUNNER_TEMP/partfetch-release-assets"
          summary_file="$RUNNER_TEMP/partfetch-summary.md"

          rm -rf "$work_dir" "$release_asset_dir"
          mkdir -p "$work_dir" "$release_asset_dir"

          {
            echo "# PartFetch v2 Summary"
            echo ""
            echo "- Storage mode: \`$STORAGE_MODE\`"
            echo "- URL count: \`$url_count\`"
            echo "- Split size: \`${SPLIT_SIZE_MIB}MiB\`"
            echo ""
            echo "| # | File | Size | Parts | SHA256 | Location |"
            echo "|---:|---|---:|---:|---|---|"
          } > "$summary_file"

          build_auth_args() {
            auth_args=()
            if [[ -n "${HTTP_AUTH_HEADER:-}" ]]; then
              if [[ "$HTTP_AUTH_HEADER" == *":"* ]]; then
                auth_args=(-H "$HTTP_AUTH_HEADER")
              else
                auth_args=(-H "Authorization: $HTTP_AUTH_HEADER")
              fi
            fi
          }

          detect_filename() {
            local headers="$1"
            local url="$2"
            python3 - "$headers" "$url" <<'PY'
          import os
          import sys
          import urllib.parse

          headers_path, url = sys.argv[1], sys.argv[2]

          content_dispositions = []
          try:
              with open(headers_path, "r", encoding="utf-8", errors="replace") as f:
                  for line in f:
                      if line.lower().startswith("content-disposition:"):
                          content_dispositions.append(line.split(":", 1)[1].strip())
          except FileNotFoundError:
              pass

          name = ""

          if content_dispositions:
              cd = content_dispositions[-1]
              params = {}
              for part in cd.split(";")[1:]:
                  if "=" in part:
                      key, value = part.split("=", 1)
                      key = key.strip().lower()
                      value = value.strip().strip('"')
                      params[key] = value

              if "filename*" in params:
                  value = params["filename*"]
                  if "''" in value:
                      value = value.split("''", 1)[1]
                  name = urllib.parse.unquote(value)
              elif "filename" in params:
                  name = params["filename"]

          if not name:
              path = urllib.parse.urlparse(url).path
              name = os.path.basename(urllib.parse.unquote(path))

          if not name:
              name = "download.bin"

          print(name)
          PY
          }

          index=0

          while IFS= read -r url; do
            index=$((index + 1))
            printf -v index_pad "%03d" "$index"

            tmp_file="$(mktemp)"
            headers_file="$(mktemp)"

            build_auth_args

            echo "Downloading #$index..."
            curl --fail --location --retry 3 --connect-timeout 30 \
              --dump-header "$headers_file" \
              --output "$tmp_file" \
              "${auth_args[@]}" \
              "$url"

            if [[ "$url_count" -eq 1 && -n "$OUTPUT_NAME" ]]; then
              raw_name="$OUTPUT_NAME"
            else
              raw_name="$(detect_filename "$headers_file" "$url")"
            fi

            safe_name="$(sanitize_component "$raw_name")"

            if [[ -z "$safe_name" || "$safe_name" == "." || "$safe_name" == ".." ]]; then
              safe_name="download.bin"
            fi

            size="$(stat -c%s "$tmp_file")"
            hash="$(sha256sum "$tmp_file" | awk '{print $1}')"
            short_hash="${hash:0:12}"

            base_name="${safe_name%.*}"
            if [[ -z "$base_name" || "$base_name" == "$safe_name" && "$safe_name" == .* ]]; then
              base_name="file"
            fi
            base_name="$(sanitize_component "$base_name")"
            base_name="${base_name:0:50}"
            if [[ -z "$base_name" ]]; then
              base_name="file"
            fi

            subdir="${timestamp}_${index_pad}_${base_name}_${short_hash}"

            if [[ "$STORAGE_MODE" == "repo" && "$DEDUPE" == "true" && -d "$folder" ]]; then
              if grep -R -l "\"sha256\": \"$hash\"" "$folder" >/dev/null 2>&1; then
                echo "Duplicate SHA256 found in repo manifests. Skipping: $safe_name"
                {
                  echo "| $index | \`$safe_name\` | $size | 0 | \`${short_hash}...\` | skipped duplicate |"
                } >> "$summary_file"
                rm -f "$tmp_file" "$headers_file"
                continue
              fi
            fi

            if [[ "$STORAGE_MODE" == "repo" ]]; then
              target_dir="$folder/$subdir"
            else
              target_dir="$work_dir/$subdir"
            fi

            mkdir -p "$target_dir"

            sha_file="$safe_name.sha256"
            printf "%s  %s\n" "$hash" "$safe_name" > "$target_dir/$sha_file"

            split_status="false"
            part_count=1

            if (( size > LIMIT_BYTES )); then
              split_status="true"
              echo "File is larger than 100MiB. Splitting into ${SPLIT_SIZE_MIB}MiB parts..."
              split -b "$PART_BYTES" -d -a 4 "$tmp_file" "$target_dir/$safe_name.part-"
              rm -f "$tmp_file"
              part_count="$(find "$target_dir" -maxdepth 1 -type f -name "$safe_name.part-*" | wc -l | tr -d ' ')"
            else
              mv "$tmp_file" "$target_dir/$safe_name"
            fi

            if [[ "$STORAGE_MODE" == "release" ]]; then
              asset_prefix="${subdir}__"
              rebuild_input_prefix="${asset_prefix}"
            else
              asset_prefix=""
              rebuild_input_prefix=""
            fi

            if [[ "$split_status" == "true" ]]; then
              {
                echo "#!/usr/bin/env bash"
                echo "set -euo pipefail"
                echo "cat \"${rebuild_input_prefix}${safe_name}.part-\"* > \"$safe_name\""
                echo "sha256sum -c \"${rebuild_input_prefix}${sha_file}\""
              } > "$target_dir/rebuild.sh"
              chmod +x "$target_dir/rebuild.sh"
            else
              {
                echo "#!/usr/bin/env bash"
                echo "set -euo pipefail"
                if [[ "$STORAGE_MODE" == "release" ]]; then
                  echo "cp \"${rebuild_input_prefix}${safe_name}\" \"$safe_name\""
                fi
                echo "sha256sum -c \"${rebuild_input_prefix}${sha_file}\""
              } > "$target_dir/verify.sh"
              chmod +x "$target_dir/verify.sh"
            fi

            {
              echo "# $safe_name"
              echo ""
              echo "- Original URL: $url"
              echo "- Original size: $size bytes"
              echo "- SHA256: \`$hash\`"
              echo "- Split: \`$split_status\`"
              echo "- Parts: \`$part_count\`"
              echo "- Storage mode: \`$STORAGE_MODE\`"
              echo ""
              if [[ "$split_status" == "true" ]]; then
                echo "## Rebuild"
                echo ""
                echo "\`\`\`bash"
                if [[ "$STORAGE_MODE" == "release" ]]; then
                  echo "bash ${asset_prefix}rebuild.sh"
                else
                  echo "bash rebuild.sh"
                fi
                echo "\`\`\`"
              else
                echo "## Verify"
                echo ""
                echo "\`\`\`bash"
                if [[ "$STORAGE_MODE" == "release" ]]; then
                  echo "bash ${asset_prefix}verify.sh"
                else
                  echo "bash verify.sh"
                fi
                echo "\`\`\`"
              fi
            } > "$target_dir/README.md"

            export PF_TARGET_DIR="$target_dir"
            export PF_URL="$url"
            export PF_FILENAME="$safe_name"
            export PF_SIZE="$size"
            export PF_SHA256="$hash"
            export PF_SPLIT="$split_status"
            export PF_PART_COUNT="$part_count"
            export PF_STORAGE_MODE="$STORAGE_MODE"
            export PF_SUBDIR="$subdir"
            export PF_ASSET_PREFIX="$asset_prefix"
            export PF_SPLIT_SIZE_MIB="$SPLIT_SIZE_MIB"
            python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          target_dir = os.environ["PF_TARGET_DIR"]
          asset_prefix = os.environ["PF_ASSET_PREFIX"]
          planned_files = sorted(set(os.listdir(target_dir) + ["manifest.json"]))

          manifest = {
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "url": os.environ["PF_URL"],
              "filename": os.environ["PF_FILENAME"],
              "size_bytes": int(os.environ["PF_SIZE"]),
              "sha256": os.environ["PF_SHA256"],
              "split": os.environ["PF_SPLIT"].lower() == "true",
              "part_count": int(os.environ["PF_PART_COUNT"]),
              "split_size_mib": int(os.environ["PF_SPLIT_SIZE_MIB"]),
              "storage_mode": os.environ["PF_STORAGE_MODE"],
              "subdir": os.environ["PF_SUBDIR"],
              "asset_prefix": asset_prefix,
              "files": planned_files,
              "release_asset_names": [asset_prefix + f for f in planned_files] if asset_prefix else [],
          }
          with open(os.path.join(target_dir, "manifest.json"), "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

            if [[ "$STORAGE_MODE" == "release" ]]; then
              while IFS= read -r -d '' f; do
                cp "$f" "$release_asset_dir/${asset_prefix}$(basename "$f")"
              done < <(find "$target_dir" -maxdepth 1 -type f -print0)
              location="release asset prefix: ${asset_prefix}"
            else
              location="$target_dir"
            fi

            {
              echo "| $index | \`$safe_name\` | $size | $part_count | \`${short_hash}...\` | \`$location\` |"
            } >> "$summary_file"

            rm -f "$headers_file"
          done < "$urls_file"

          if [[ "$STORAGE_MODE" == "repo" ]]; then
            git add "$folder"

            if git diff --cached --quiet; then
              echo "No repository changes to commit."
              echo "" >> "$summary_file"
              echo "No repository changes to commit." >> "$summary_file"
            else
              git commit -m "Add downloaded files via PartFetch"
              git pull --rebase origin "$GITHUB_REF_NAME"
              git push origin "HEAD:$GITHUB_REF_NAME"
              echo "" >> "$summary_file"
              echo "Committed and pushed downloaded files to \`$GITHUB_REF_NAME\`." >> "$summary_file"
            fi
          else
            release_tag="$RELEASE_TAG_INPUT"
            if [[ -z "$release_tag" ]]; then
              release_tag="partfetch-${GITHUB_RUN_NUMBER}"
            fi

            release_notes="$RUNNER_TEMP/partfetch-release-notes.md"
            cp "$summary_file" "$release_notes"

            if gh release view "$release_tag" >/dev/null 2>&1; then
              echo "Release exists: $release_tag"
            else
              gh release create "$release_tag" \
                --title "PartFetch download $GITHUB_RUN_NUMBER" \
                --notes-file "$release_notes"
            fi

            mapfile -t upload_files < <(find "$release_asset_dir" -type f | sort)

            if (( ${#upload_files[@]} == 0 )); then
              echo "No release assets to upload."
            else
              gh release upload "$release_tag" "${upload_files[@]}" --clobber
              echo "" >> "$summary_file"
              echo "Uploaded assets to release tag \`$release_tag\`." >> "$summary_file"
            fi
          fi

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
