name: ChunkBox Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "One or more direct download URLs. Separate multiple URLs with a new line or comma."
        required: true
        type: string
      storage_mode:
        description: "Where to save results. repo uses batched pushes, release uploads assets, auto chooses release for big files."
        required: true
        default: "repo"
        type: choice
        options:
          - repo
          - release
          - auto
      output_folder:
        description: "Folder inside repo when storage_mode=repo"
        required: false
        default: "downloads"
        type: string
      output_name:
        description: "Optional output filename. Only used when there is exactly one URL."
        required: false
        default: ""
        type: string
      release_tag:
        description: "Release tag when storage_mode=release or auto chooses release. Empty means auto-generated."
        required: false
        default: ""
        type: string
      split_size_mib:
        description: "Part size in MiB. Must be 1-98."
        required: false
        default: "98"
        type: string
      repo_push_batch_mib:
        description: "Max staged file size per repo push batch in MiB. Keep below GitHub's 2GiB push limit."
        required: false
        default: "1500"
        type: string
      auto_release_above_mib:
        description: "When storage_mode=auto, files larger than this MiB are saved to release."
        required: false
        default: "1800"
        type: string
      dedupe:
        description: "Skip repo save if a manifest with the same SHA256 already exists"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: chunkbox-downloader
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      URLS: ${{ inputs.urls }}
      STORAGE_MODE: ${{ inputs.storage_mode }}
      OUTPUT_FOLDER: ${{ inputs.output_folder }}
      OUTPUT_NAME: ${{ inputs.output_name }}
      RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
      SPLIT_SIZE_MIB: ${{ inputs.split_size_mib }}
      REPO_PUSH_BATCH_MIB: ${{ inputs.repo_push_batch_mib }}
      AUTO_RELEASE_ABOVE_MIB: ${{ inputs.auto_release_above_mib }}
      DEDUPE: ${{ inputs.dedupe }}
      GH_TOKEN: ${{ github.token }}
      HTTP_AUTH_HEADER: ${{ secrets.DOWNLOAD_AUTH_HEADER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download, split, package, and save
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          LIMIT_BYTES=$((100 * 1024 * 1024))

          require_number() {
            local value="$1"
            local name="$2"
            if ! [[ "$value" =~ ^[0-9]+$ ]]; then
              echo "$name must be a number."
              exit 1
            fi
          }

          require_number "$SPLIT_SIZE_MIB" "split_size_mib"
          require_number "$REPO_PUSH_BATCH_MIB" "repo_push_batch_mib"
          require_number "$AUTO_RELEASE_ABOVE_MIB" "auto_release_above_mib"

          if (( SPLIT_SIZE_MIB < 1 || SPLIT_SIZE_MIB > 98 )); then
            echo "split_size_mib must be between 1 and 98."
            exit 1
          fi

          if (( REPO_PUSH_BATCH_MIB < 100 || REPO_PUSH_BATCH_MIB > 1900 )); then
            echo "repo_push_batch_mib must be between 100 and 1900."
            exit 1
          fi

          if [[ "$STORAGE_MODE" != "repo" && "$STORAGE_MODE" != "release" && "$STORAGE_MODE" != "auto" ]]; then
            echo "storage_mode must be repo, release, or auto."
            exit 1
          fi

          PART_BYTES=$((SPLIT_SIZE_MIB * 1024 * 1024))
          REPO_PUSH_BATCH_BYTES=$((REPO_PUSH_BATCH_MIB * 1024 * 1024))
          AUTO_RELEASE_ABOVE_BYTES=$((AUTO_RELEASE_ABOVE_MIB * 1024 * 1024))

          sanitize_component() {
            printf '%s' "$1" | tr -cd 'A-Za-z0-9._-'
          }

          trim() {
            sed 's/^[[:space:]]*//; s/[[:space:]]*$//'
          }

          folder="$(printf '%s' "$OUTPUT_FOLDER" | sed 's#^\./##; s#//*#/#g; s#/$##')"

          if [[ -z "$folder" || "$folder" == "." || "$folder" == /* || "$folder" == *".."* ]]; then
            echo "Invalid output folder: $folder"
            exit 1
          fi

          urls_file="$RUNNER_TEMP/chunkbox-urls.txt"
          printf '%s\n' "$URLS" \
            | tr ',' '\n' \
            | sed 's/\r//g' \
            | trim \
            | grep -v '^#' \
            | grep -v '^$' > "$urls_file"

          url_count="$(wc -l < "$urls_file" | tr -d ' ')"

          if (( url_count == 0 )); then
            echo "No URL provided."
            exit 1
          fi

          timestamp="$(date -u +'%Y-%m-%d_%H%M%S')"
          work_dir="$RUNNER_TEMP/chunkbox-work"
          release_asset_dir="$RUNNER_TEMP/chunkbox-release-assets"
          summary_file="$RUNNER_TEMP/chunkbox-summary.md"

          rm -rf "$work_dir" "$release_asset_dir"
          mkdir -p "$work_dir" "$release_asset_dir"

          {
            echo "# ChunkBox Summary"
            echo ""
            echo "- Requested storage mode: \`$STORAGE_MODE\`"
            echo "- URL count: \`$url_count\`"
            echo "- Split size: \`${SPLIT_SIZE_MIB}MiB\`"
            echo "- Repo push batch: \`${REPO_PUSH_BATCH_MIB}MiB\`"
            echo ""
            echo "| # | File | Size | Parts | SHA256 | Storage | Location |"
            echo "|---:|---|---:|---:|---|---|---|"
          } > "$summary_file"

          build_auth_args() {
            auth_args=()
            if [[ -n "${HTTP_AUTH_HEADER:-}" ]]; then
              if [[ "$HTTP_AUTH_HEADER" == *":"* ]]; then
                auth_args=(-H "$HTTP_AUTH_HEADER")
              else
                auth_args=(-H "Authorization: $HTTP_AUTH_HEADER")
              fi
            fi
          }

          detect_filename() {
            local headers="$1"
            local url="$2"
            python3 - "$headers" "$url" <<'PY'
          import os
          import sys
          import urllib.parse
          
          headers_path, url = sys.argv[1], sys.argv[2]
          
          content_dispositions = []
          try:
              with open(headers_path, "r", encoding="utf-8", errors="replace") as f:
                  for line in f:
                      if line.lower().startswith("content-disposition:"):
                          content_dispositions.append(line.split(":", 1)[1].strip())
          except FileNotFoundError:
              pass
          
          name = ""
          
          if content_dispositions:
              cd = content_dispositions[-1]
              params = {}
              for part in cd.split(";")[1:]:
                  if "=" in part:
                      key, value = part.split("=", 1)
                      key = key.strip().lower()
                      value = value.strip().strip('"')
                      params[key] = value
          
              if "filename*" in params:
                  value = params["filename*"]
                  if "''" in value:
                      value = value.split("''", 1)[1]
                  name = urllib.parse.unquote(value)
              elif "filename" in params:
                  name = params["filename"]
          
          if not name:
              path = urllib.parse.urlparse(url).path
              name = os.path.basename(urllib.parse.unquote(path))
          
          if not name:
              name = "download.bin"
          
          print(name)
          PY
          }

          create_release_if_needed() {
            local release_tag="$1"
            local notes_file="$2"

            if gh release view "$release_tag" >/dev/null 2>&1; then
              echo "Release exists: $release_tag"
            else
              gh release create "$release_tag" \
                --title "ChunkBox download $GITHUB_RUN_NUMBER" \
                --notes-file "$notes_file"
            fi
          }

          commit_staged_batch() {
            local batch_num="$1"

            if git diff --cached --quiet; then
              return 0
            fi

            git commit -m "Add downloaded files via ChunkBox batch $batch_num"
            git fetch origin "$GITHUB_REF_NAME"
            git rebase "origin/$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          }

          commit_and_push_repo_changes_in_batches() {
            local target_path="$1"
            local batch_num=1
            local current_bytes=0
            local file_size=0
            local has_files=0

            mapfile -d '' repo_files < <(git ls-files -o -m --exclude-standard -z -- "$target_path" | sort -z)

            if (( ${#repo_files[@]} == 0 )); then
              echo "No repository changes to commit."
              echo "" >> "$summary_file"
              echo "No repository changes to commit." >> "$summary_file"
              return 0
            fi

            echo "Committing and pushing repo files in batches up to ${REPO_PUSH_BATCH_MIB}MiB..."

            for file in "${repo_files[@]}"; do
              if [[ ! -f "$file" ]]; then
                continue
              fi

              file_size="$(stat -c%s "$file")"

              if (( current_bytes > 0 && current_bytes + file_size > REPO_PUSH_BATCH_BYTES )); then
                echo "Pushing batch $batch_num..."
                commit_staged_batch "$batch_num"
                batch_num=$((batch_num + 1))
                current_bytes=0
              fi

              git add -- "$file"
              current_bytes=$((current_bytes + file_size))
              has_files=1
            done

            if (( has_files == 1 )); then
              echo "Pushing final batch $batch_num..."
              commit_staged_batch "$batch_num"
              echo "" >> "$summary_file"
              echo "Committed and pushed repository files in batches." >> "$summary_file"
            fi
          }

          index=0
          repo_files_created=0
          release_files_created=0

          while IFS= read -r url; do
            index=$((index + 1))
            printf -v index_pad "%03d" "$index"

            tmp_file="$(mktemp)"
            headers_file="$(mktemp)"

            build_auth_args

            echo "Downloading #$index..."
            curl --fail --location --retry 3 --connect-timeout 30 \
              --dump-header "$headers_file" \
              --output "$tmp_file" \
              "${auth_args[@]}" \
              "$url"

            if [[ "$url_count" -eq 1 && -n "$OUTPUT_NAME" ]]; then
              raw_name="$OUTPUT_NAME"
            else
              raw_name="$(detect_filename "$headers_file" "$url")"
            fi

            safe_name="$(sanitize_component "$raw_name")"

            if [[ -z "$safe_name" || "$safe_name" == "." || "$safe_name" == ".." ]]; then
              safe_name="download.bin"
            fi

            size="$(stat -c%s "$tmp_file")"
            hash="$(sha256sum "$tmp_file" | awk '{print $1}')"
            short_hash="${hash:0:12}"

            effective_storage_mode="$STORAGE_MODE"
            if [[ "$STORAGE_MODE" == "auto" ]]; then
              if (( size > AUTO_RELEASE_ABOVE_BYTES )); then
                effective_storage_mode="release"
              else
                effective_storage_mode="repo"
              fi
            fi

            base_name="${safe_name%.*}"
            if [[ -z "$base_name" || "$base_name" == "$safe_name" && "$safe_name" == .* ]]; then
              base_name="file"
            fi
            base_name="$(sanitize_component "$base_name")"
            base_name="${base_name:0:50}"
            if [[ -z "$base_name" ]]; then
              base_name="file"
            fi

            subdir="${timestamp}_${index_pad}_${base_name}_${short_hash}"

            if [[ "$effective_storage_mode" == "repo" && "$DEDUPE" == "true" && -d "$folder" ]]; then
              if grep -R -l "\"sha256\": \"$hash\"" "$folder" >/dev/null 2>&1; then
                echo "Duplicate SHA256 found in repo manifests. Skipping: $safe_name"
                {
                  echo "| $index | \`$safe_name\` | $size | 0 | \`${short_hash}...\` | repo | skipped duplicate |"
                } >> "$summary_file"
                rm -f "$tmp_file" "$headers_file"
                continue
              fi
            fi

            if [[ "$effective_storage_mode" == "repo" ]]; then
              target_dir="$folder/$subdir"
              asset_prefix=""
              repo_files_created=1
            else
              target_dir="$work_dir/$subdir"
              asset_prefix="${subdir}__"
              release_files_created=1
            fi

            mkdir -p "$target_dir"

            sha_file="$safe_name.sha256"
            printf "%s  %s\n" "$hash" "$safe_name" > "$target_dir/$sha_file"

            split_status="false"
            part_count=1

            if (( size > LIMIT_BYTES )); then
              split_status="true"
              echo "File is larger than 100MiB. Splitting into ${SPLIT_SIZE_MIB}MiB parts..."
              split -b "$PART_BYTES" -d -a 4 "$tmp_file" "$target_dir/$safe_name.part-"
              rm -f "$tmp_file"
              part_count="$(find "$target_dir" -maxdepth 1 -type f -name "$safe_name.part-*" | wc -l | tr -d ' ')"
            else
              mv "$tmp_file" "$target_dir/$safe_name"
            fi

            if [[ "$split_status" == "true" ]]; then
              {
                echo "#!/usr/bin/env bash"
                echo "set -euo pipefail"
                echo 'cd "$(dirname "$0")"'
                echo "cat \"${asset_prefix}${safe_name}.part-\"* > \"$safe_name\""
                echo "sha256sum -c \"${asset_prefix}${sha_file}\""
              } > "$target_dir/rebuild.sh"
              chmod +x "$target_dir/rebuild.sh"
            else
              {
                echo "#!/usr/bin/env bash"
                echo "set -euo pipefail"
                echo 'cd "$(dirname "$0")"'
                if [[ "$effective_storage_mode" == "release" ]]; then
                  echo "cp \"${asset_prefix}${safe_name}\" \"$safe_name\""
                fi
                echo "sha256sum -c \"${asset_prefix}${sha_file}\""
              } > "$target_dir/verify.sh"
              chmod +x "$target_dir/verify.sh"
            fi

            {
              echo "# $safe_name"
              echo ""
              echo "- Original URL: $url"
              echo "- Original size: $size bytes"
              echo "- SHA256: \`$hash\`"
              echo "- Split: \`$split_status\`"
              echo "- Parts: \`$part_count\`"
              echo "- Storage mode: \`$effective_storage_mode\`"
              echo ""
              if [[ "$split_status" == "true" ]]; then
                echo "## Rebuild"
                echo ""
                echo "\`\`\`bash"
                if [[ "$effective_storage_mode" == "release" ]]; then
                  echo "bash ${asset_prefix}rebuild.sh"
                else
                  echo "bash rebuild.sh"
                fi
                echo "\`\`\`"
              else
                echo "## Verify"
                echo ""
                echo "\`\`\`bash"
                if [[ "$effective_storage_mode" == "release" ]]; then
                  echo "bash ${asset_prefix}verify.sh"
                else
                  echo "bash verify.sh"
                fi
                echo "\`\`\`"
              fi
            } > "$target_dir/README.md"

            export CB_TARGET_DIR="$target_dir"
            export CB_URL="$url"
            export CB_FILENAME="$safe_name"
            export CB_SIZE="$size"
            export CB_SHA256="$hash"
            export CB_SPLIT="$split_status"
            export CB_PART_COUNT="$part_count"
            export CB_STORAGE_MODE="$effective_storage_mode"
            export CB_SUBDIR="$subdir"
            export CB_ASSET_PREFIX="$asset_prefix"
            export CB_SPLIT_SIZE_MIB="$SPLIT_SIZE_MIB"
            export CB_REPO_PUSH_BATCH_MIB="$REPO_PUSH_BATCH_MIB"
            python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          
          target_dir = os.environ["CB_TARGET_DIR"]
          asset_prefix = os.environ["CB_ASSET_PREFIX"]
          planned_files = sorted(set(os.listdir(target_dir) + ["manifest.json"]))
          
          manifest = {
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "url": os.environ["CB_URL"],
              "filename": os.environ["CB_FILENAME"],
              "size_bytes": int(os.environ["CB_SIZE"]),
              "sha256": os.environ["CB_SHA256"],
              "split": os.environ["CB_SPLIT"].lower() == "true",
              "part_count": int(os.environ["CB_PART_COUNT"]),
              "split_size_mib": int(os.environ["CB_SPLIT_SIZE_MIB"]),
              "repo_push_batch_mib": int(os.environ["CB_REPO_PUSH_BATCH_MIB"]),
              "storage_mode": os.environ["CB_STORAGE_MODE"],
              "subdir": os.environ["CB_SUBDIR"],
              "asset_prefix": asset_prefix,
              "files": planned_files,
              "release_asset_names": [asset_prefix + f for f in planned_files] if asset_prefix else [],
          }
          with open(os.path.join(target_dir, "manifest.json"), "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

            if [[ "$effective_storage_mode" == "release" ]]; then
              while IFS= read -r -d '' f; do
                cp "$f" "$release_asset_dir/${asset_prefix}$(basename "$f")"
              done < <(find "$target_dir" -maxdepth 1 -type f -print0)
              location="release asset prefix: ${asset_prefix}"
            else
              location="$target_dir"
            fi

            {
              echo "| $index | \`$safe_name\` | $size | $part_count | \`${short_hash}...\` | $effective_storage_mode | \`$location\` |"
            } >> "$summary_file"

            rm -f "$headers_file"
          done < "$urls_file"

          if (( repo_files_created == 1 )); then
            commit_and_push_repo_changes_in_batches "$folder"
          fi

          if (( release_files_created == 1 )); then
            release_tag="$RELEASE_TAG_INPUT"
            if [[ -z "$release_tag" ]]; then
              release_tag="chunkbox-${GITHUB_RUN_NUMBER}"
            fi

            release_notes="$RUNNER_TEMP/chunkbox-release-notes.md"
            cp "$summary_file" "$release_notes"

            create_release_if_needed "$release_tag" "$release_notes"

            mapfile -t upload_files < <(find "$release_asset_dir" -type f | sort)

            if (( ${#upload_files[@]} == 0 )); then
              echo "No release assets to upload."
            else
              gh release upload "$release_tag" "${upload_files[@]}" --clobber
              echo "" >> "$summary_file"
              echo "Uploaded assets to release tag \`$release_tag\`." >> "$summary_file"
            fi
          fi

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
